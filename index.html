<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎓 Final List Lookup | Merit & Waiting (100 Candidates)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0b0f1c 0%, #1a1f33 50%, #0d1225 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: floatOrb 12s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #ff4d6d;
            top: -100px;
            left: -100px;
            animation-duration: 14s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: #4cc9f0;
            bottom: -100px;
            right: -80px;
            animation-duration: 16s;
            animation-delay: 2s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #f9c74f;
            top: 40%;
            left: 60%;
            animation-duration: 18s;
            animation-delay: 4s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 70px) scale(1.15); }
        }

        .main-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 30px 25px 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            transition: 0.3s;
        }

        .header-glow {
            text-align: center;
            margin-bottom: 25px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #f9d423, #ff4d6d, #4cc9f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(255, 77, 109, 0.5));
            animation: titlePulse 2.5s infinite alternate;
            margin-bottom: 8px;
        }

        @keyframes titlePulse {
            0% { text-shadow: 0 0 10px #ff4d6d; }
            100% { text-shadow: 0 0 25px #4cc9f0, 0 0 45px #f9c74f; }
        }

        .sub {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.35);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            margin-bottom: 5px;
        }

        .input-group {
            margin: 25px 0 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .input-field {
            width: 100%;
            max-width: 350px;
            background: rgba(20, 25, 45, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            padding: 14px 20px;
            font-size: 1.1rem;
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        .input-field:focus {
            border-color: #f9c74f;
            box-shadow: 0 0 25px rgba(249, 199, 79, 0.5);
            background: rgba(30, 35, 60, 0.8);
        }

        .result-popup {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 25px 20px;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(255, 255, 255, 0.05);
            animation: fadeSlide 0.5s ease-out;
            display: none;
            text-align: center;
        }

        .result-popup.show {
            display: block;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .student-name {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffd166, #ff4d6d, #06d6a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            word-break: break-word;
            animation: glowText 2s infinite alternate;
        }

        @keyframes glowText {
            from { filter: drop-shadow(0 0 8px #ff4d6d); }
            to { filter: drop-shadow(0 0 18px #4cc9f0); }
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }

        .info-label {
            color: #ccc;
            font-weight: 500;
        }

        .info-value {
            font-weight: 700;
            color: #fff;
        }

        .status-merit {
            background: linear-gradient(135deg, #06d6a0, #118ab2);
            color: white;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.2rem;
            display: inline-block;
            letter-spacing: 1px;
        }

        .status-waiting {
            background: linear-gradient(135deg, #f9c74f, #f9844a);
            color: #0b0f1c;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.2rem;
            display: inline-block;
            letter-spacing: 1px;
        }

        .error-message {
            color: #ff8c94;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
        }

        .linkedin-note {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .linkedin-link {
            color: #4cc9f0;
            font-weight: 700;
            text-decoration: none;

            padding: 5px 18px;
            border-radius: 30px;
            transition: 0.3s;

        }

        .linkedin-link:hover {
            background: #4cc9f0;
            color: #0b0f1c;
            box-shadow: 0 0 25px #4cc9f0;
        }

</head>
